<!DOCTYPE html>
<html>
<head>
    <title>Birthday Surprise 💖</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* LOGIN */
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        input, button {
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            background: #ff4d6d;
            color: white;
            cursor: pointer;
        }

        /* MAIN CARD */
        .container {
            display: none;
            width: 800px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeIn 1.5s;
            position: relative;
            z-index: 2;
        }

        @keyframes fadeIn {
            from {opacity:0; transform: scale(0.9);}
            to {opacity:1; transform: scale(1);}
        }

        /* HEADER */
        .header {
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            padding: 20px;
            text-align: center;
            color: white;
        }

        /* CONTENT */
        .content {
            display: flex;
            padding: 20px;
            align-items: center;
        }

        img {
            width: 250px;
            border-radius: 15px;
            box-shadow: 0 0 15px pink;
            animation: float 3s infinite;
        }

        @keyframes float {
            0% {transform: translateY(0);}
            50% {transform: translateY(-10px);}
            100% {transform: translateY(0);}
        }

        .text {
            margin-left: 30px;
            font-size: 18px;
            color: #333;
        }

        .footer {
            text-align: center;
            padding: 10px;
            background: #ffe4ec;
        }

        /* BALLOONS */
        .balloon {
            position: absolute;
            bottom: -100px;
            font-size: 35px;
            display: none;
        }

        .animateBalloon {
            display: block;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-900px); }
        }

        /* CONFETTI */
        .confetti {
            position: absolute;
            top: -10px;
            font-size: 20px;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(800px); }
        }

    </style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="login">
    <h2>Enter Your Details 💖</h2>
    <input type="text" id="name" placeholder="Enter Name"><br>
    <input type="password" id="dob" placeholder="Enter Date of Birth"><br>
    <button onclick="check()">Submit</button>
</div>

<!-- MAIN -->
<div class="container" id="mainPage">
    <div class="header">
        <h1>🎉 Happy Birthday 🎂</h1>
        <h3 id="username"></h3>
    </div>

    <div class="content">
        <img src="image.jpeg">

        <div class="text">
            <p>💖 You are a very special person for me.</p>
            <p>✨ Stay happy forever.</p>
            <p>🎂 Wishing you many more happy returns of the day.</p>
        </div>
    </div>

    <div class="footer">Made with ❤️</div>
</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
    <source src="Birthday.mp3" type="audio/mpeg">
</audio>

<!-- BALLOONS -->
<div class="balloon" id="b1" style="left:10%">🎈</div>
<div class="balloon" id="b2" style="left:30%">🎉</div>
<div class="balloon" id="b3" style="left:50%">🎊</div>
<div class="balloon" id="b4" style="left:70%">💖</div>
<div class="balloon" id="b5" style="left:90%">🎂</div>

<script>
function check() {
    var name = document.getElementById("name").value;
    var dob = document.getElementById("dob").value;

    var correctName = "Premanvitha";
    var correctDob = "03-04-2006";

    if (name === correctName && dob === correctDob) {

        document.getElementById("login").style.display = "none";
        document.getElementById("mainPage").style.display = "block";
        document.getElementById("username").innerText = name + " 💖";

        // MUSIC
        let music = document.getElementById("bgMusic");
        music.volume = 0;
        music.play();

        let v = 0;
        let fade = setInterval(()=>{
            if(v < 0.5){
                v += 0.05;
                music.volume = v;
            } else clearInterval(fade);
        },200);

        // BALLOONS START
        ["b1","b2","b3","b4","b5"].forEach(id=>{
            document.getElementById(id).classList.add("animateBalloon");
        });

        // CONFETTI BLAST 🌸✨
        for(let i=0;i<50;i++){
            let conf = document.createElement("div");
            conf.className = "confetti";
            conf.innerHTML = ["🌸","✨","💖","🎊"][Math.floor(Math.random()*4)];
            conf.style.left = Math.random()*100 + "%";
            conf.style.animationDuration = (2 + Math.random()*3)+"s";
            document.body.appendChild(conf);
        }

    } else {
        alert("Wrong details 😢");
    }
}
</script>

</body>
</html>
